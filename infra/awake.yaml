# SOVEREIGN GENESIS: REMOTE IGNITION ENGINE
# Rebuilds compute and deploys the full service stack from within the cloud.

steps:
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'create-cluster'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      echo "[IGNITION] Creating Cluster: ${_CLUSTER_NAME}..."
      gcloud container clusters create "${_CLUSTER_NAME}" \
          --zone "${_ZONE}" \
          --num-nodes 3 \
          --machine-type n1-standard-4 \
          --project "${PROJECT_ID}" \
          --quiet || echo "Cluster may already exist. Proceeding..."

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'wait-for-readiness'
  waitFor: ['create-cluster']
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      gcloud container clusters get-credentials "${_CLUSTER_NAME}" --zone "${_ZONE}" --project "${PROJECT_ID}"
      echo "[IGNITION] Waiting for cluster nodes to achieve 'Ready' status..."
      for i in {1..20}; do
        if kubectl get nodes | grep -q " Ready"; then
          echo "[SUCCESS] Cluster is responsive."
          exit 0
        fi
        echo "Waiting for nodes... ($i/20)"
        sleep 15
      done
      exit 1

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'create-namespace'
  waitFor: ['wait-for-readiness']
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      gcloud container clusters get-credentials "${_CLUSTER_NAME}" --zone "${_ZONE}" --project "${PROJECT_ID}"
      echo "[IGNITION] Creating Sovereign Namespace: ${_NAMESPACE}..."
      kubectl create namespace "${_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy-crds-and-operator'
  waitFor: ['create-namespace']
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      gcloud container clusters get-credentials "${_CLUSTER_NAME}" --zone "${_ZONE}" --project "${PROJECT_ID}"
      echo "[IGNITION] Registering CRDs and Operators..."
      # CRDs MUST be applied before the Operator
      kubectl apply -f infra/manifests/backbone/05-crdb-crds.yaml
      kubectl apply -f infra/manifests/backbone/04-crdb-operator.yaml -n "${_NAMESPACE}"
      echo "Waiting for CRD reconciliation..."
      sleep 45

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy-backbone-instances'
  waitFor: ['deploy-crds-and-operator']
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      gcloud container clusters get-credentials "${_CLUSTER_NAME}" --zone "${_ZONE}" --project "${PROJECT_ID}"
      echo "[IGNITION] Inducting Backbone Software Instances..."
      kubectl apply -f infra/manifests/backbone/01-nats.yaml -n "${_NAMESPACE}"
      kubectl apply -f infra/manifests/backbone/02-kafka.yaml -n "${_NAMESPACE}"
      kubectl apply -f infra/manifests/backbone/03-questdb.yaml -n "${_NAMESPACE}"
      kubectl apply -f infra/manifests/backbone/06-crdb-cluster.yaml -n "${_NAMESPACE}"
      sleep 15

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy-services'
  waitFor: ['deploy-backbone-instances']
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      gcloud container clusters get-credentials "${_CLUSTER_NAME}" --zone "${_ZONE}" --project "${PROJECT_ID}"
      echo "[IGNITION] Deploying application services onto ${_NAMESPACE}..."
      kubectl apply -f infra/manifests/services/ -n "${_NAMESPACE}"
      kubectl apply -f infra/gce_ingress.yaml -n "${_NAMESPACE}"
      echo "[SUCCESS] Enclave is operational."

substitutions:
  _CLUSTER_NAME: "sovereign-genesis"
  _ZONE: "us-central1-a"
  _NAMESPACE: "sovereign-genesis"

options:
  logging: CLOUD_LOGGING_ONLY
