# SOVEREIGN GENESIS: TERMINAL GRADUATION INDUCTION (BUILD #76 - PHASE 7.62)
# Universal Tag: rc13-verified
# Topology: Reconciled 'Controller-Root' context with Surgical Prefix Removal.

steps:
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      REGISTRY="us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs"
      
      echo "[FOUNDATION] Birthing Python-Base (Tag: 2026-04-21)..."
      cat <<'EOF' > Dockerfile.base
      FROM python:3.10-slim
      # [PHASE 7.57] Source-Based Reconciliation (libyang v2)
      RUN apt-get update && apt-get install -y --no-install-recommends \
          build-essential git libssl-dev libffi-dev python3-dev \
          cmake libpcre2-dev && \
          rm -rf /var/lib/apt/lists/*
          
      RUN git clone https://github.com/CESNET/libyang.git && \
          cd libyang && git checkout v2.1.128 && \
          mkdir build && cd build && \
          cmake -D CMAKE_INSTALL_PREFIX:PATH=/usr .. && \
          make -j$(nproc) && make install && \
          ldconfig
      
      # [PHASE 7.53] Manifest-Based Dependency Ingestion
      WORKDIR /var/teraflow
      COPY baseline/tfs-controller/src/common/requirements_unified.in /var/teraflow/common/
      RUN echo "deepdiff" >> /var/teraflow/common/requirements_unified.in && \
          echo "requests" >> /var/teraflow/common/requirements_unified.in && \
          echo "pyyaml" >> /var/teraflow/common/requirements_unified.in && \
          echo "geopy" >> /var/teraflow/common/requirements_unified.in && \
          echo "paramiko" >> /var/teraflow/common/requirements_unified.in && \
          echo "pandas" >> /var/teraflow/common/requirements_unified.in && \
          echo "matplotlib" >> /var/teraflow/common/requirements_unified.in && \
          echo "ncclient" >> /var/teraflow/common/requirements_unified.in && \
          echo "netifaces" >> /var/teraflow/common/requirements_unified.in && \
          echo "onnxruntime" >> /var/teraflow/common/requirements_unified.in && \
          echo "pydantic" >> /var/teraflow/common/requirements_unified.in && \
          echo "pygnmi" >> /var/teraflow/common/requirements_unified.in && \
          echo "tabulate" >> /var/teraflow/common/requirements_unified.in && \
          echo "yattag" >> /var/teraflow/common/requirements_unified.in && \
          echo "websockets" >> /var/teraflow/common/requirements_unified.in && \
          echo "elasticsearch" >> /var/teraflow/common/requirements_unified.in && \
          echo "confluent-kafka" >> /var/teraflow/common/requirements_unified.in && \
          echo "deepmerge" >> /var/teraflow/common/requirements_unified.in && \
          echo "cryptography" >> /var/teraflow/common/requirements_unified.in && \
          echo "scikit-learn" >> /var/teraflow/common/requirements_unified.in && \
          echo "flask-httpauth" >> /var/teraflow/common/requirements_unified.in && \
          echo "netaddr" >> /var/teraflow/common/requirements_unified.in && \
          echo "pyang" >> /var/teraflow/common/requirements_unified.in && \
          echo "pyangbind" >> /var/teraflow/common/requirements_unified.in && \
          pip install --no-cache-dir -r /var/teraflow/common/requirements_unified.in
      
      # [SPEC] Ingesting Total Inter-Service Client Fabric
      COPY baseline/tfs-controller/proto/ /var/teraflow/proto/
      COPY baseline/tfs-controller/src/ /var/teraflow/src_tmp/
      
      # [PHASE 7.63] Deep Client Ingestion (Total Mesh Saturation)
      # We hunt for all client directories (excluding common) and anchor them to their service root.
      RUN find /var/teraflow/src_tmp -type d -name "client" ! -path "*/common/*" | while read client_dir; do \
            service_root=$(dirname "$client_dir"); \
            while [ "$(basename $(dirname "$service_root"))" != "src_tmp" ] && [ "$service_root" != "/var/teraflow/src_tmp" ]; do \
              service_root=$(dirname "$service_root"); \
            done; \
            service_name=$(basename "$service_root"); \
            dest_dir="/var/teraflow/$service_name/$(echo "$client_dir" | sed "s|.*$service_name/||")"; \
            mkdir -p "$dest_dir"; \
            cp -r "$client_dir/." "$dest_dir/"; \
            # Anchor all intermediate namespaces
            curr_dir="$dest_dir"; \
            while [ "$curr_dir" != "/var/teraflow" ] && [ "$curr_dir" != "/" ]; do \
              touch "$curr_dir/__init__.py"; \
              curr_dir=$(dirname "$curr_dir"); \
            done; \
          done && \
          cp -r /var/teraflow/src_tmp/common/* /var/teraflow/common/ && \
          rm -rf /var/teraflow/src_tmp && \
          touch /var/teraflow/common/__init__.py
      
      # [PHASE 7.51] Code Generation Recovery (The Kill Shot)
      RUN rm -rf /var/teraflow/common/proto && mkdir -p /var/teraflow/common/proto && \
          python3 -m grpc_tools.protoc -I/var/teraflow/proto --python_out=/var/teraflow/common/proto \
          --grpc_python_out=/var/teraflow/common/proto /var/teraflow/proto/*.proto && \
          find /var/teraflow/common/proto -type f -name "*_pb2*.py" -exec sed -i -E 's/^import ([^ ]*)_pb2/from . import \1_pb2/g' {} + && \
          touch /var/teraflow/common/proto/__init__.py /var/teraflow/common/__init__.py
          
      # [PHASE 7.74] Final Component Ingestion (Load Generator)
      RUN mkdir -p /var/teraflow/load_generator
      COPY baseline/tfs-controller/src/load_generator/ /var/teraflow/load_generator/
      
      # [PHASE 7.66] Total Namespace Saturation
      RUN find /var/teraflow -type d -exec touch {}/__init__.py \;
      RUN echo "[DEBUG] Gold Master Structure:" && find /var/teraflow -maxdepth 3
      
      WORKDIR /var/teraflow
      ENV PYTHONPATH=/var/teraflow
      EOF
      
      docker build -t "$${REGISTRY}/python-base:$_TAG" -f Dockerfile.base .
      docker push "$${REGISTRY}/python-base:$_TAG"

- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      REGISTRY="us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs"
      
      COMPONENTS=(
          "context:src/context:contextservice"
          "device:src/device:deviceservice"
          "service:src/service:serviceservice"
          "slice:src/slice:sliceservice"
          "pathcomp:src/pathcomp:pathcompservice"
          "nbi:src/nbi:nbi"
          "webui:src/webui:webui"
          "monitoring:src/monitoring:monitoringservice"
          "automation:src/automation:automationservice"
          "analytics-frontend:src/analytics/frontend:analytics-frontend"
          "analytics-backend:src/analytics/backend:analytics-backend"
          "telemetry-frontend:src/telemetry/frontend:telemetry-frontend"
          "telemetry-backend:src/telemetry/backend:telemetry-backend"
      )

      for COMP_DATA in "$${COMPONENTS[@]}"; do
          IFS=':' read -r S_NAME REL_PATH T_NAME <<< "$$COMP_DATA"
          echo "[FORGE] Birthing $$S_NAME..."
          
          # [PHASE 7.73] Absolute Workdir Enforcement
          # Ensure every service runs from /var/teraflow to prevent local shadowing
          DOCKERFILE="baseline/tfs-controller/$$REL_PATH/Dockerfile"
          echo "WORKDIR /var/teraflow" >> "$$DOCKERFILE"
          
          if [ ! -f "$$DOCKERFILE" ]; then
              echo "Error: Dockerfile $$DOCKERFILE not found in $(pwd)."
              exit 1
          fi
          
          # [PHASE 7.62] Standardized Context (baseline/tfs-controller/)
          docker build -t "$${REGISTRY}/$$T_NAME:$_TAG" -f "$$DOCKERFILE" baseline/tfs-controller/
          docker push "$${REGISTRY}/$$T_NAME:$_TAG"
      done

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      echo "[DEPLOY] Authenticating to Hardened Cottage: $_CLUSTER_NAME..."
      gcloud container clusters get-credentials "$_CLUSTER_NAME" --zone "$_ZONE" --project "$PROJECT_ID"
      
      REGISTRY="us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs"
      
      COMPONENTS=(
          "context:contextservice.yaml"
          "device:deviceservice.yaml"
          "service:serviceservice.yaml"
          "slice:sliceservice.yaml"
          "pathcomp:pathcompservice.yaml"
          "nbi:nbiservice.yaml"
          "webui:webuiservice.yaml"
          "monitoring:monitoringservice.yaml"
          "automation:automationservice.yaml"
          "analytics-frontend:analyticsservice.yaml" "analytics-backend:analyticsservice.yaml"
          "telemetry-frontend:telemetryservice.yaml"
          "telemetry-backend:telemetryservice.yaml"
      )

      # [PHASE 7.XX] Birthing Manifest Hardener (Universal Orchestrator)
      cat <<'EOF' | sed 's/^      //' > harden_manifest.py
      import sys, re
      manifest = sys.argv[1]
      service = sys.argv[2]
      tag = sys.argv[3]
      registry = sys.argv[4]
      
      with open(manifest, 'r') as f:
          content = f.read()

      # [PHASE 1] Image & Strategy Overwrite
      t_name = service + "service"
      if service in ["webui", "nbi", "telemetry-frontend", "telemetry-backend", "analytics-frontend", "analytics-backend"]:
          t_name = service
      content = re.sub(r'image: .*' + service + r'.*:[a-zA-Z0-9._-]*', f'image: {registry}/{t_name}:{tag}', content)
      content = re.sub(r'strategy:\n\s+type: .*', 'strategy:\n    type: Recreate', content)
      if 'strategy:' not in content:
          content = re.sub(r'spec:\n', 'spec:\n  strategy:\n    type: Recreate\n', content, count=1)

      # [PHASE 2] Resource Hardening
      content = re.sub(r'cpu: .*', 'cpu: 250m', content, count=1)
      cpu_limit = "1000m" if service in ['webui', 'context'] else "500m"
      content = re.sub(r'cpu: .*', f'cpu: {cpu_limit}', content, count=2)
      content = re.sub(r'memory: .*', 'memory: 128Mi', content, count=1)
      content = re.sub(r'memory: .*', 'memory: 256Mi', content, count=2)

      # [PHASE 3] Environment & Security Induction (CRDB SSL Disable)
      if 'env:' in content and 'CRDB_SSLMODE' not in content:
          content = re.sub(r'env:', 'env:\n        - name: CRDB_SSLMODE\n          value: "disable"', content, count=1)

      # [PHASE 4] Absolute Workdir & Entrypoint Enforcement
      if service == "nbi":
          content = re.sub(r'python3.*', '["python3", "-m", "nbi.service.app"]', content)
      elif service in ["telemetry-frontend", "analytics-frontend", "telemetry-backend", "analytics-backend"]:
          content = re.sub(r'python3.*', '["python3", "-m", "' + service.replace("-", ".") + '.service.__main__"]', content)
      elif "command:" in content:
          content = re.sub(r'python3.*', '["python3", "-m", "' + service + '.service.__main__"]', content)

      # [PHASE 5] Service Exposure Logic
      if service == "nbi":
          content = content.replace("type: ClusterIP", "type: LoadBalancer").replace("type: NodePort", "type: LoadBalancer")
      elif service == "webui":
          content = content.replace("type: ClusterIP", "type: NodePort").replace("type: LoadBalancer", "type: NodePort")

      with open(manifest, 'w') as f:
          f.write(content)
      EOF

      echo "[INDUCTION] Creating Orchestration Secrets..."
      kubectl create secret generic kfk-kpi-data --from-literal=KFK_SERVER_ADDRESS=kafka-public.default.svc.cluster.local:9092 --from-literal=KAFKA_API_VERSION=3.7.0 --dry-run=client -o yaml | kubectl apply -f -
      kubectl create secret generic qdb-data --from-literal=username=admin --from-literal=password=quest --from-literal=METRICSDB_USER=admin --from-literal=METRICSDB_PASS=quest --from-literal=METRICSDB_HOSTNAME=questdb-public --dry-run=client -o yaml | kubectl apply -f -
      kubectl create secret generic crdb-data --from-literal=CRDB_USERNAME=admin --from-literal=CRDB_PASSWORD=quest --from-literal=CRDB_DATABASE=tfs_context --from-literal=CRDB_NAMESPACE=default --dry-run=client -o yaml | kubectl apply -f -
      kubectl create secret generic nats-data --from-literal=NATS_USERNAME=admin --from-literal=NATS_PASSWORD=quest --dry-run=client -o yaml | kubectl apply -f -

      echo "[INDUCTION] Executing Terminal Induction (Universal Tag: $_TAG)..."
      
      echo "[BACKBONE] Purging Ghost Resources..."
      kubectl delete statefulset kafka questdb --ignore-not-found=true
      kubectl delete service kafka-public questdb-public --ignore-not-found=true
      
      echo "[BACKBONE] Inducing Fresh Persistence Fabric..."
      sed -i 's/kafka-public.kafka.svc.cluster.local/kafka-public.default.svc.cluster.local/' baseline/tfs-controller/manifests/kafka/single-node.yaml
      kubectl apply -f infra/storage-class-hardened.yaml
      kubectl apply -f baseline/tfs-controller/manifests/cockroachdb/crds.yaml
      kubectl wait --for=condition=established --timeout=60s crd/crdbclusters.crdb.cockroachlabs.com
      kubectl apply -f baseline/tfs-controller/manifests/cockroachdb/operator.yaml
      kubectl rollout status deployment/cockroach-operator-manager -n cockroach-operator-system --timeout=120s
      sleep 10
      kubectl apply -f baseline/tfs-controller/manifests/cockroachdb/cluster.yaml
      kubectl apply -f baseline/tfs-controller/manifests/nats/nats_fidelity.yaml
      kubectl apply -f baseline/tfs-controller/manifests/kafka/single-node.yaml
      kubectl apply -f baseline/tfs-controller/manifests/questdb/manifest.yaml
      
      sleep 30

      for COMP_DATA in "${COMPONENTS[@]}"; do
          IFS=':' read -r S_NAME MANIFEST_FILE <<< "$$COMP_DATA"
          MANIFEST="baseline/tfs-controller/manifests/$$MANIFEST_FILE"
          if [ ! -f "$$MANIFEST" ]; then continue; fi
          
          python3 harden_manifest.py "$$MANIFEST" "$$S_NAME" "$_TAG" "$REGISTRY"
          
          echo "[INDUCTION] Inducing $$S_NAME onto cluster..."
          kubectl apply -f "$$MANIFEST"
      done
      
      echo "[GATEWAY] Inducting NGINX Ingress..."
      kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
      sleep 60
      kubectl apply -f infra/tfs_ingress.yaml
      echo "[GRADUATION] Mission Success."

options:
  machineType: 'E2_HIGHCPU_8'
  substitution_option: 'ALLOW_LOOSE'

substitutions:
  _CLUSTER_NAME: "sovereign-genesis"
  _ZONE: "us-central1-a"
  _TAG: "rc13-verified"
