# SOVEREIGN GENESIS: TERMINAL GRADUATION INDUCTION (BUILD #55)
# Universal Tag: 2026-04-21-rc4
# Topology: Mandatory sequential re-forge to bridge artifact/configuration rift.

steps:
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      REGISTRY="us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs"
      
      echo "[FOUNDATION] Birthing Python-Base (Tag: 2026-04-21)..."
      cat <<EOF > Dockerfile.base
      FROM python:3.9-slim
      RUN apt-get update && apt-get install -y --no-install-recommends \
          build-essential git libssl-dev libffi-dev python3-dev && \
          rm -rf /var/lib/apt/lists/*
      RUN pip install --no-cache-dir \
          SQLAlchemy==1.4.39 protobuf==3.20.3 grpcio==1.47.5 \
          grpcio-tools==1.47.5 flask-healthz==1.0.1 Werkzeug==2.3.7
      EOF
      
      docker build -t "$${REGISTRY}/python-base:2026-04-21" -f Dockerfile.base .
      docker push "$${REGISTRY}/python-base:2026-04-21"

- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      COMPONENTS=(
        "context" "device" "service" "slice" "pathcomp" "nbi" "webui" "monitoring" "automation" "analytics" "telemetry"
      )
      
      REGISTRY="us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs"
      
      echo "[FORGE] Initiating Absolute Path-Aware Synthesis of Enclave DNA (Tag: $_TAG)..."
      IFS=$'\n'
      COMPONENTS=(
        "context:context:contextservice"
        "device:device:deviceservice"
        "service:service:serviceservice"
        "slice:slice:sliceservice"
        "pathcomp:pathcomp:pathcompservice"
        "nbi:nbi:nbiservice"
        "webui:webui:webui"
        "monitoring:monitoring:monitoringservice"
        "automation:automation:automationservice"
        "analytics:analytics/frontend:analyticsservice"
        "telemetry:telemetry/frontend:telemetryservice"
      )
      
      for ENTRY in "$${COMPONENTS[@]}"; do
        IFS=':' read -r S_NAME REL_PATH T_NAME <<< "$$ENTRY"
        echo "[FORGE] Birthing $$S_NAME (Path: $$REL_PATH, Target: $$T_NAME)..."
        
        DOCKERFILE="baseline/tfs-controller/src/$$REL_PATH/Dockerfile"
        if [ ! -f "$$DOCKERFILE" ]; then 
           echo "Error: Dockerfile $$DOCKERFILE not found."
           exit 1
        fi
        
        # Sequential Build (Throttled for 4GB Floor)
        docker build -t "$${REGISTRY}/$${T_NAME}:$_TAG" -f "$$DOCKERFILE" .
        docker push "$${REGISTRY}/$${T_NAME}:$_TAG"
      done

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      echo "[DEPLOY] Authenticating to Hardened Cottage: $_CLUSTER_NAME..."
      gcloud container clusters get-credentials "$_CLUSTER_NAME" --zone "$_ZONE" --project "$PROJECT_ID"
      
      IFS=$'\n'
      COMPONENTS=(
        "context:context:contextservice:contextservice.yaml"
        "device:device:deviceservice:deviceservice.yaml"
        "service:service:serviceservice:serviceservice.yaml"
        "slice:slice:sliceservice:sliceservice.yaml"
        "pathcomp:pathcomp:pathcompservice:pathcompservice.yaml"
        "nbi:nbi:nbiservice:nbiservice.yaml"
        "webui:webui:webui:webuiservice.yaml"
        "monitoring:monitoring:monitoringservice:monitoringservice.yaml"
        "automation:automation:automationservice:automationservice.yaml"
        "analytics:analytics/frontend:analyticsservice:analyticsservice.yaml"
        "telemetry:telemetry/frontend:telemetryservice:telemetryservice.yaml"
      )
      
      REGISTRY="us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs"
      
      echo "[INDUCTION] Executing Terminal Greedy Induction (Universal Tag: $_TAG)..."
      for ENTRY in "$${COMPONENTS[@]}"; do
        IFS=':' read -r S_NAME REL_PATH T_NAME MANIFEST_FILE <<< "$$ENTRY"
        MANIFEST="baseline/tfs-controller/manifests/$$MANIFEST_FILE"
        if [ ! -f "$$MANIFEST" ]; then continue; fi
        
        # Greedy Overwrite
        sed -i "s|image: .*$${S_NAME}:[a-zA-Z0-9._-]*|image: $${REGISTRY}/$${T_NAME}:$_TAG|g" "$$MANIFEST"
        
        echo "[INDUCTION] Inducing $$S_NAME onto cluster (Artifact: $$T_NAME)..."
        kubectl apply -f "$$MANIFEST"
      done
      
      echo "[GRADUATION] Mission Success. All core services inducted onto the Cottage floor."

options:
  machineType: 'E2_HIGHCPU_8'
  substitution_option: 'ALLOW_LOOSE'

substitutions:
  _CLUSTER_NAME: "sovereign-genesis"
  _ZONE: "us-central1-a"
  _TAG: "2026-04-21-rc4"
