# SOVEREIGN GENESIS: TERMINAL GRADUATION INDUCTION (BUILD #61)
# Universal Tag: 2026-04-21-rc4
# Topology: Mandated 'cd' context anchor for absolute path-aware synthesis.

steps:
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      REGISTRY="us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs"
      
      echo "[FOUNDATION] Birthing Python-Base (Tag: 2026-04-21)..."
      cat <<EOF > Dockerfile.base
      FROM python:3.9-slim
      RUN apt-get update && apt-get install -y --no-install-recommends \
          build-essential git libssl-dev libffi-dev python3-dev && \
          rm -rf /var/lib/apt/lists/*
      RUN pip install --no-cache-dir \
          SQLAlchemy==1.4.39 protobuf==3.20.3 grpcio==1.47.5 \
          grpcio-tools==1.47.5 flask-healthz==1.0.1 Werkzeug==2.3.7
      EOF
      
      docker build -t "$${REGISTRY}/python-base:2026-04-21" -f Dockerfile.base .
      docker push "$${REGISTRY}/python-base:2026-04-21"

- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      REGISTRY="us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs"
      
      # Shift working directory to align Docker context
      cd baseline/tfs-controller/

      COMPONENTS=(
          "context:src/context:contextservice"
          "device:src/device:deviceservice"
          "service:src/service:serviceservice"
          "slice:src/slice:sliceservice"
          "pathcomp:src/pathcomp:pathcompservice"
          "nbi:src/nbi:nbiservice"
          "webui:src/webui:webui"
          "monitoring:src/monitoring:monitoringservice"
          "automation:src/automation:automationservice"
          "analytics:src/analytics/frontend:analyticsservice"
          "telemetry:src/telemetry/frontend:telemetryservice"
      )

      for COMP_DATA in "$${COMPONENTS[@]}"; do
          IFS=':' read -r S_NAME REL_PATH T_NAME <<< "$$COMP_DATA"
          echo "[FORGE] Birthing $$S_NAME..."
          DOCKERFILE="$$REL_PATH/Dockerfile"
          
          if [ ! -f "$$DOCKERFILE" ]; then
              echo "Error: Dockerfile $$DOCKERFILE not found in $(pwd)."
              exit 1
          fi
          
          # Build using current directory (.) as context
          docker build -t "$${REGISTRY}/$$T_NAME:$_TAG" -f "$$DOCKERFILE" .
          docker push "$${REGISTRY}/$$T_NAME:$_TAG"
      done

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      echo "[DEPLOY] Authenticating to Hardened Cottage: $_CLUSTER_NAME..."
      gcloud container clusters get-credentials "$_CLUSTER_NAME" --zone "$_ZONE" --project "$PROJECT_ID"
      
      REGISTRY="us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs"
      
      COMPONENTS=(
          "context:contextservice.yaml"
          "device:deviceservice.yaml"
          "service:serviceservice.yaml"
          "slice:sliceservice.yaml"
          "pathcomp:pathcompservice.yaml"
          "nbi:nbiservice.yaml"
          "webui:webuiservice.yaml"
          "monitoring:monitoringservice.yaml"
          "automation:automationservice.yaml"
          "analytics:analyticsservice.yaml"
          "telemetry:telemetryservice.yaml"
      )

      echo "[INDUCTION] Executing Terminal Greedy Induction (Universal Tag: $_TAG)..."
      for COMP_DATA in "$${COMPONENTS[@]}"; do
          IFS=':' read -r S_NAME MANIFEST_FILE <<< "$$COMP_DATA"
          MANIFEST="baseline/tfs-controller/manifests/$$MANIFEST_FILE"
          if [ ! -f "$$MANIFEST" ]; then continue; fi
          
          # Induction Target (Physically aligned to artifact names in forge)
          T_NAME="$$S_NAME"service
          [[ "$$S_NAME" == "webui" || "$$S_NAME" == "nbi" ]] && T_NAME="$$S_NAME"

          # Greedy Overwrite
          sed -i "s|image: .*$${S_NAME}:[a-zA-Z0-9._-]*|image: $${REGISTRY}/$${T_NAME}:$_TAG|g" "$$MANIFEST"
          
          echo "[INDUCTION] Inducing $$S_NAME onto cluster (Artifact: $$T_NAME)..."
          kubectl apply -f "$$MANIFEST"
      done
      
      echo "[GRADUATION] Mission Success. All core services inducted onto the Cottage floor."

options:
  machineType: 'E2_HIGHCPU_8'
  substitution_option: 'ALLOW_LOOSE'

substitutions:
  _CLUSTER_NAME: "sovereign-genesis"
  _ZONE: "us-central1-a"
  _TAG: "2026-04-21-rc4"
