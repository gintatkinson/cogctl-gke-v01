# SOVEREIGN GENESIS: REMOTE FOUNDATION PURGE
# Sanitizes orphaned storage resources from within the cloud context.

steps:
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'purge-orphans'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex
      echo "[PURGE] Hunting for orphaned Sovereign disks..."
      ORPHAN_DISKS=$(gcloud compute disks list --filter="name ~ gke-sovereign-genesis AND users ~ none" --format="value(name)")

      if [ -n "$$ORPHAN_DISKS" ]; then
          echo "[PURGE] Found orphans: $$ORPHAN_DISKS"
          gcloud compute disks delete $$ORPHAN_DISKS --zone "${_ZONE}" --project "${PROJECT_ID}" --quiet
      else
          echo "[PURGE] No orphaned disks found. Clean state verified."
      fi

substitutions:
  _ZONE: "us-central1-a"

options:
  logging: CLOUD_LOGGING_ONLY
