steps:
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set +e
      echo "[UI-AUDIT] TARGET IP: 136.112.218.241"
      PATHS=("/webui/" "/webui/context/" "/webui/device/" "/webui/service/" "/webui/slice/" "/grafana/" "/restconf/" "/qkd_app/")
      for PATH in "${PATHS[@]}"; do
        echo "Testing: http://136.112.218.241$PATH"
        curl -I -s -m 5 "http://136.112.218.241$PATH" | grep "HTTP/" || echo "FAILED (Timeout or No Response)"
      done
