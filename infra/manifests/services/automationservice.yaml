apiVersion: apps/v1
kind: Deployment
metadata:
  name: automationservice
  namespace: sovereign-genesis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: automationservice
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        config.linkerd.io/skip-outbound-ports: '2002'
      labels:
        app: automationservice
    spec:
      containers:
      - args:
        - 'sed -i ''s/wait_for_environment_variables(/if False: wait_for_environment_variables(/g''
          /var/teraflow/automation/service/__main__.py && python -m automation.service'
        command:
        - /bin/sh
        - -c
        env:
        - name: CONTEXT_SERVICE_HOST
          value: contextservice
        - name: CONTEXT_SERVICE_PORT_GRPC
          value: '1010'
        - name: DEVICE_SERVICE_HOST
          value: deviceservice
        - name: DEVICE_SERVICE_PORT_GRPC
          value: '2020'
        - name: TELEMETRY_SERVICE_HOST
          value: telemetryservice
        - name: TELEMETRY_SERVICE_PORT_GRPC
          value: '30050'
        - name: ANALYTICS_SERVICE_HOST
          value: analyticsservice
        - name: ANALYTICS_SERVICE_PORT_GRPC
          value: '30080'
        - name: POLICY_SERVICE_HOST
          value: 127.0.0.1
        - name: POLICY_SERVICE_PORT_GRPC
          value: '0'
        - name: LOG_LEVEL
          value: INFO
        - name: PYTHONUNBUFFERED
          value: '1'
        - name: CRDB_DATABASE
          value: tfs_automation
        - name: CRDB_NAMESPACE
          value: sovereign-genesis
        - name: CRDB_SSLMODE
          value: disable
        - name: CRDB_SQL_PORT
          value: '26257'
        - name: KAFKA_API_VERSION
          value: 3.7.0
        - name: KPI_MANAGER_SERVICE_HOST
          value: 127.0.0.1
        - name: KPI_MANAGER_SERVICE_PORT_GRPC
          value: '0'
        - name: POLICYSERVICE_SERVICE_HOST
          value: 127.0.0.1
        - name: POLICYSERVICE_SERVICE_PORT_GRPC
          value: '0'
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        envFrom:
        - secretRef:
            name: crdb-data
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/automationservice:v3.1-customer
        imagePullPolicy: Always
        name: server
        ports:
        - containerPort: 30200
        - containerPort: 9192
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 250m
            memory: 128Mi
        startupProbe:
          failureThreshold: 5
          grpc:
            port: 30200
          initialDelaySeconds: 10
          periodSeconds: 1
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo "waiting
          for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: automationservice
  name: automationservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: grpc
    port: 30200
    protocol: TCP
    targetPort: 30200
  - name: metrics
    port: 9192
    protocol: TCP
    targetPort: 9192
  selector:
    app: automationservice
  type: ClusterIP
