apiVersion: apps/v1
kind: Deployment
metadata:
  name: nbiservice
  namespace: sovereign-genesis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nbiservice
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nbiservice
    spec:
      containers:
      - env:
        - name: LOG_LEVEL
          value: INFO
        - name: FLASK_ENV
          value: production
        - name: IETF_NETWORK_RENDERER
          value: LIBYANG
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        envFrom:
        - secretRef:
            name: kfk-kpi-data
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/nbi:v3.1-customer
        imagePullPolicy: Always
        name: server
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 1000m
            memory: 2048Mi
          requests:
            cpu: 150m
            memory: 1024Mi
        startupProbe:
          failureThreshold: 5
          initialDelaySeconds: 300
          periodSeconds: 10
          tcpSocket:
            port: 8080
          timeoutSeconds: 5
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: nbiservice
  name: nbiservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: nbiservice
  type: ClusterIP
