apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generatorservice
  namespace: sovereign-genesis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generatorservice
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: load-generatorservice
    spec:
      containers:
      - env:
        - name: LOG_LEVEL
          value: INFO
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/load_generator:v3.1-customer
        imagePullPolicy: Always
        name: server
        ports:
        - containerPort: 50052
        - containerPort: 9192
        resources:
          limits:
            cpu: 512m
            memory: 128Mi
          requests:
            cpu: 256m
            memory: 128Mi
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: load-generatorservice
  name: load-generatorservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: grpc
    port: 50052
    protocol: TCP
    targetPort: 50052
  - name: metrics
    port: 9192
    protocol: TCP
    targetPort: 9192
  selector:
    app: load-generatorservice
  type: ClusterIP
