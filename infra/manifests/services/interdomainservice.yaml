apiVersion: apps/v1
kind: Deployment
metadata:
  name: interdomainservice
  namespace: sovereign-genesis
spec:
  selector:
    matchLabels:
      app: interdomainservice
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: interdomainservice
    spec:
      containers:
      - env:
        - name: LOG_LEVEL
          value: INFO
        - name: TOPOLOGY_ABSTRACTOR
          value: DISABLE
        - name: DLT_INTEGRATION
          value: DISABLE
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/interdomain:v3.1-customer
        imagePullPolicy: Always
        name: server
        ports:
        - containerPort: 10010
        - containerPort: 9192
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 250m
            memory: 128Mi
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: interdomainservice
  name: interdomainservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: grpc
    port: 10010
    protocol: TCP
    targetPort: 10010
  - name: metrics
    port: 9192
    protocol: TCP
    targetPort: 9192
  selector:
    app: interdomainservice
  type: ClusterIP
