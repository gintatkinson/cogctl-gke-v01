apiVersion: apps/v1
kind: Deployment
metadata:
  name: teservice
  namespace: sovereign-genesis
spec:
  selector:
    matchLabels:
      app: teservice
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        config.linkerd.io/skip-inbound-ports: '4189'
      labels:
        app: teservice
    spec:
      containers:
      - env:
        - name: ERLANG_LOGGER_LEVEL
          value: debug
        - name: ERLANG_COOKIE
          value: tfte-unsafe-cookie
        - name: ERLANG_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: ERLANG_NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/te:v3.1-customer
        imagePullPolicy: Always
        name: server
        ports:
        - containerPort: 10030
        resources:
          limits:
            cpu: 700m
            memory: 1024Mi
          requests:
            cpu: 250m
            memory: 1024Mi
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      shareProcessNamespace: true
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: teservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: grpc
    port: 10030
    protocol: TCP
    targetPort: 10030
  - name: pcep
    port: 4189
    protocol: TCP
    targetPort: 4189
  selector:
    app: teservice
  type: ClusterIP
