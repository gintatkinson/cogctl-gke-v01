apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyticsservice
  namespace: sovereign-genesis
spec:
  selector:
    matchLabels:
      app: analyticsservice
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: analyticsservice
    spec:
      containers:
      - env:
        - name: LOG_LEVEL
          value: INFO
        - name: CRDB_DATABASE
          value: tfs_analytics
        - name: CRDB_NAMESPACE
          value: sovereign-genesis
        - name: CRDB_SQL_PORT
          value: '26257'
        - name: CRDB_HOST
          value: cockroachdb-public
        - name: CRDB_SSLMODE
          value: disable
        - name: METRICS_PORT
          value: '9192'
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        envFrom:
        - secretRef:
            name: crdb-data
        - secretRef:
            name: kfk-kpi-data
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/analytics-frontend:v3.1-customer
        imagePullPolicy: Always
        name: frontend
        ports:
        - containerPort: 30080
        - containerPort: 9192
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 250m
            memory: 128Mi
      - env:
        - name: LOG_LEVEL
          value: INFO
        - name: METRICS_PORT
          value: '9193'
        - name: CRDB_DATABASE
          value: tfs_analytics
        - name: CRDB_NAMESPACE
          value: sovereign-genesis
        - name: CRDB_SQL_PORT
          value: '26257'
        - name: CRDB_HOST
          value: cockroachdb-public
        - name: CRDB_SSLMODE
          value: disable
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        envFrom:
        - secretRef:
            name: crdb-data
        - secretRef:
            name: kfk-kpi-data
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/analytics-backend:v3.1-customer
        imagePullPolicy: Always
        name: backend
        ports:
        - containerPort: 30090
        - containerPort: 9193
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 250m
            memory: 128Mi
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: analyticsservice
  name: analyticsservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: grpc
    port: 30080
    protocol: TCP
    targetPort: 30080
  - name: grpc-backend
    port: 30090
    protocol: TCP
    targetPort: 30090
  - name: metrics-frontend
    port: 9192
    protocol: TCP
    targetPort: 9192
  - name: metrics-backend
    port: 9193
    protocol: TCP
    targetPort: 9193
  selector:
    app: analyticsservice
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analyticsservice-hpa
  namespace: sovereign-genesis
spec:
  maxReplicas: 20
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 80
        type: Utilization
    type: Resource
  minReplicas: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analyticsservice
