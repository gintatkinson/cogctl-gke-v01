apiVersion: apps/v1
kind: Deployment
metadata:
  name: l3-centralizedattackdetectorservice
  namespace: sovereign-genesis
spec:
  selector:
    matchLabels:
      app: l3-centralizedattackdetectorservice
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: l3-centralizedattackdetectorservice
    spec:
      containers:
      - env:
        - name: LOG_LEVEL
          value: INFO
        - name: BATCH_SIZE
          value: '256'
        - name: CAD_CLASSIFICATION_THRESHOLD
          value: '0.5'
        - name: MONITORED_KPIS_TIME_INTERVAL_AGG
          value: '60'
        - name: TEST_ML_MODEL
          value: '0'
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/l3_centralizedattackdetector:v3.1-customer
        imagePullPolicy: Always
        name: server
        ports:
        - containerPort: 10001
        - containerPort: 9192
        resources:
          limits:
            cpu: 700m
            memory: 1024Mi
          requests:
            cpu: 250m
            memory: 1024Mi
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: l3-centralizedattackdetectorservice
  name: l3-centralizedattackdetectorservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: metrics
    port: 9192
    protocol: TCP
    targetPort: 9192
  - name: grpc
    port: 10001
    targetPort: 10001
  selector:
    app: l3-centralizedattackdetectorservice
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: l3-centralizedattackdetectorservice-hpa
  namespace: sovereign-genesis
spec:
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
  maxReplicas: 10
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 80
        type: Utilization
    type: Resource
  minReplicas: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: l3-centralizedattackdetectorservice
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app: l3-centralizedattackdetectorservice
  name: tfs-l3-centralizedattackdetectorservice-metric
  namespace: sovereign-genesis
spec:
  endpoints:
  - interval: 5s
    path: /metrics
    port: metrics
    scheme: http
  namespaceSelector:
    any: false
    matchNames:
    - tfs
  selector:
    matchLabels:
      app: l3-centralizedattackdetectorservice
  strategy:
    type: Recreate
