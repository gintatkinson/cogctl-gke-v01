apiVersion: apps/v1
kind: Deployment
metadata:
  name: qkd-appservice
  namespace: sovereign-genesis
spec:
  selector:
    matchLabels:
      app: qkd-appservice
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: qkd-appservice
    spec:
      containers:
      - env:
        - name: LOG_LEVEL
          value: INFO
        - name: CRDB_DATABASE
          value: tfs_qkd_app
        - name: CRDB_NAMESPACE
          value: sovereign-genesis
        - name: CRDB_SQL_PORT
          value: '26257'
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        envFrom:
        - secretRef:
            name: crdb-data
        - secretRef:
            name: nats-data
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/qkd_app:v3.1-customer
        imagePullPolicy: Always
        name: server
        ports:
        - containerPort: 10060
        - containerPort: 9192
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 150m
            memory: 128Mi
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: qkd-appservice
  name: qkd-appservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: grpc
    port: 10060
    protocol: TCP
    targetPort: 10060
  - name: metrics
    port: 9192
    protocol: TCP
    targetPort: 9192
  selector:
    app: qkd-appservice
  type: ClusterIP
