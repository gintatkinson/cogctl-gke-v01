apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoringservice
  namespace: sovereign-genesis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoringservice
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: monitoringservice
    spec:
      containers:
      - env:
        - name: LOG_LEVEL
          value: INFO
        - name: METRICSDB_HOSTNAME
          value: questdb-public
        - name: METRICSDB_ILP_PORT
          value: '9009'
        - name: METRICSDB_REST_PORT
          value: '9000'
        - name: METRICSDB_TABLE
          value: monitoring
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        envFrom:
        - secretRef:
            name: qdb-data
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/monitoringservice:v3.1-customer
        imagePullPolicy: Always
        name: server
        ports:
        - containerPort: 7070
        - containerPort: 9192
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 250m
            memory: 256Mi
        startupProbe:
          failureThreshold: 5
          initialDelaySeconds: 300
          periodSeconds: 10
          tcpSocket:
            port: 7070
          timeoutSeconds: 5
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: monitoringservice
  name: monitoringservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: grpc
    port: 7070
    protocol: TCP
    targetPort: 7070
  - name: metrics
    port: 9192
    protocol: TCP
    targetPort: 9192
  selector:
    app: monitoringservice
  type: ClusterIP
