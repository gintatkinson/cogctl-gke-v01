apiVersion: apps/v1
kind: Deployment
metadata:
  name: opticalattackmitigatorservice
  namespace: sovereign-genesis
spec:
  selector:
    matchLabels:
      app: opticalattackmitigatorservice
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: opticalattackmitigatorservice
    spec:
      containers:
      - env:
        - name: LOG_LEVEL
          value: INFO
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/opticalattackmitigator:v3.1-customer
        imagePullPolicy: Always
        name: server
        ports:
        - containerPort: 10007
        - containerPort: 9192
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 250m
            memory: 128Mi
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: opticalattackmitigatorservice
  name: opticalattackmitigatorservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: grpc
    port: 10007
    targetPort: 10007
  - name: metrics
    port: 9192
    targetPort: 9192
  selector:
    app: opticalattackmitigatorservice
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: opticalattackmitigatorservice-hpa
  namespace: sovereign-genesis
spec:
  maxReplicas: 20
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 80
        type: Utilization
    type: Resource
  minReplicas: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: opticalattackmitigatorservice
