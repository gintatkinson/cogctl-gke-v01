apiVersion: apps/v1
kind: Deployment
metadata:
  name: opticalattackmanagerservice
  namespace: sovereign-genesis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opticalattackmanagerservice
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: opticalattackmanagerservice
    spec:
      containers:
      - env:
        - name: LOG_LEVEL
          value: INFO
        - name: MONITORING_INTERVAL
          value: '30'
        - name: OPTICALATTACKMANAGERSERVICE_LOOP_MIN_WORKERS
          value: '2'
        - name: OPTICALATTACKMANAGERSERVICE_LOOP_MAX_WORKERS
          value: '10'
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              key: REDIS_PASSWORD
              name: redis-secrets
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/opticalattackmanager:v3.1-customer
        imagePullPolicy: Always
        name: server
        ports:
        - containerPort: 10005
        - containerPort: 9192
        resources:
          limits:
            cpu: 10000m
            memory: 10240Mi
          requests:
            cpu: 250m
            memory: 128Mi
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: opticalattackmanagerservice
  name: opticalattackmanagerservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: grpc
    port: 10005
    targetPort: 10005
  - name: metrics
    port: 9192
    targetPort: 9192
  selector:
    app: opticalattackmanagerservice
  type: ClusterIP
