apiVersion: apps/v1
kind: Deployment
metadata:
  name: deviceservice
  namespace: sovereign-genesis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deviceservice
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        config.linkerd.io/skip-outbound-ports: '8002'
      labels:
        app: deviceservice
    spec:
      containers:
      - args:
        - pip install macaddress p4runtime==1.3.0 && python -m device.service
        command:
        - /bin/sh
        - -c
        env:
        - name: LOG_LEVEL
          value: INFO
        - name: CONTEXTSERVICE_HOST
          value: contextservice
        - name: CONTEXTSERVICE_PORT
          value: '1010'
        - name: CRDB_NAMESPACE
          value: sovereign-genesis
        - name: KAFKA_API_VERSION
          value: 3.7.0
        - name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
          value: python
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/deviceservice:v3.1-customer
        imagePullPolicy: Always
        name: server
        ports:
        - containerPort: 2020
        - containerPort: 9192
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 250m
            memory: 128Mi
        startupProbe:
          failureThreshold: 5
          grpc:
            port: 2020
          initialDelaySeconds: 10
          periodSeconds: 1
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: deviceservice
  name: deviceservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: grpc
    port: 2020
    protocol: TCP
    targetPort: 2020
  - name: metrics
    port: 9192
    protocol: TCP
    targetPort: 9192
  selector:
    app: deviceservice
  type: ClusterIP
