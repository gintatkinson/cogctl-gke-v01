apiVersion: apps/v1
kind: Deployment
metadata:
  name: l3-distributedattackdetectorservice
  namespace: sovereign-genesis
spec:
  selector:
    matchLabels:
      app: l3-distributedattackdetectorservice
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: l3-distributedattackdetectorservice
    spec:
      containers:
      - env:
        - name: LOG_LEVEL
          value: INFO
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/l3_distributedattackdetector:v3.1-customer
        imagePullPolicy: Always
        name: server
        ports:
        - containerPort: 10000
        resources:
          limits:
            cpu: 700m
            memory: 1024Mi
          requests:
            cpu: 250m
            memory: 1024Mi
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: l3-distributedattackdetectorservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: grpc
    port: 10000
    targetPort: 10000
  selector:
    app: l3-distributedattackdetectorservice
  type: ClusterIP
