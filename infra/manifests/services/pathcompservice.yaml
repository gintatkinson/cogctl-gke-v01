apiVersion: apps/v1
kind: Deployment
metadata:
  name: pathcompservice
  namespace: sovereign-genesis
spec:
  selector:
    matchLabels:
      app: pathcompservice
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: pathcompservice
    spec:
      containers:
      - env:
        - name: LOG_LEVEL
          value: INFO
        - name: ENABLE_FORECASTER
          value: 'NO'
        - name: METRICS_PORT
          value: '9192'
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/pathcomp-frontend:v3.1-customer
        imagePullPolicy: Always
        name: frontend
        ports:
        - containerPort: 10020
        - containerPort: 9192
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 250m
            memory: 128Mi
      - env:
        - name: METRICS_PORT
          value: '9193'
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/pathcomp-backend:v3.1-customer
        imagePullPolicy: Always
        name: backend
        ports:
        - containerPort: 8081
        - containerPort: 9193
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 250m
            memory: 256Mi
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: pathcompservice
  name: pathcompservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: grpc
    port: 10020
    protocol: TCP
    targetPort: 10020
  - name: http
    port: 8081
    protocol: TCP
    targetPort: 8081
  - name: metrics
    port: 9192
    protocol: TCP
    targetPort: 9192
  selector:
    app: pathcompservice
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pathcompservice-hpa
  namespace: sovereign-genesis
spec:
  maxReplicas: 20
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 80
        type: Utilization
    type: Resource
  minReplicas: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pathcompservice
