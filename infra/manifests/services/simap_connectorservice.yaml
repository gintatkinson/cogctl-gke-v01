apiVersion: apps/v1
kind: Deployment
metadata:
  name: simap-connectorservice
  namespace: sovereign-genesis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simap-connectorservice
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: simap-connectorservice
    spec:
      containers:
      - env:
        - name: LOG_LEVEL
          value: INFO
        - name: SIMAP_SERVER_SCHEME
          value: http
        - name: SIMAP_SERVER_ADDRESS
          value: 172.17.0.1
        - name: SIMAP_SERVER_PORT
          value: '8080'
        - name: SIMAP_SERVER_USERNAME
          value: admin
        - name: SIMAP_SERVER_PASSWORD
          value: admin
        - name: CRDB_DATABASE
          value: tfs_simap_connector
        - name: CRDB_NAMESPACE
          value: sovereign-genesis
        - name: CRDB_SQL_PORT
          value: '26257'
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        envFrom:
        - secretRef:
            name: crdb-data
        - secretRef:
            name: kfk-kpi-data
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/simap_connector:v3.1-customer
        imagePullPolicy: Always
        name: server
        ports:
        - containerPort: 9090
        - containerPort: 9192
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 250m
            memory: 128Mi
        startupProbe:
          failureThreshold: 5
          grpc:
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 1
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats 4222; do echo
          "waiting for stateful dependencies..."; sleep 2; done;
        env:
        - name: KFK_SERVER_ADDRESS
          value: kafka-public:9092
        - name: KAFKA_SERVER
          value: kafka-public:9092
        image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/busybox:v3.1-customer
        imagePullPolicy: Always
        name: init-dependencies
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: simap-connectorservice
  name: simap-connectorservice
  namespace: sovereign-genesis
spec:
  ports:
  - name: grpc
    port: 9090
    protocol: TCP
    targetPort: 9090
  - name: metrics
    port: 9192
    protocol: TCP
    targetPort: 9192
  selector:
    app: simap-connectorservice
  type: ClusterIP
