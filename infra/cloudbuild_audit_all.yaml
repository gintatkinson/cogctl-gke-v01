# SOVEREIGN GENESIS: GROUND TRUTH AUDIT
# Purpose: Deep forensic inspection of the cluster state, pods, and ingress health.
# Path: infra/cloudbuild_audit_all.yaml
# Verification: Run after Phase 5 to confirm environment stability.

steps:
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -e
      echo "[AUDIT] Authenticating to Cluster: $_CLUSTER_NAME..."
      gcloud container clusters get-credentials "$_CLUSTER_NAME" --region "$_REGION"
      
      echo "[AUDIT] Infrastructure Health (Nodes)..."
      kubectl get nodes -o wide
      
      echo "[AUDIT] Namespace Inventory..."
      kubectl get namespaces
      
      echo "[AUDIT] POD FORENSICS (All Namespaces)..."
      kubectl get pods -A
      
      echo "[AUDIT] SERVICE INVENTORY..."
      kubectl get svc -A
      
      echo "[AUDIT] INGRESS BACKEND HEALTH..."
      # Describe ingress to check for backend health from GKE perspective
      kubectl describe ingress -A
      
      echo "[AUDIT] CORE LOG ANALYSIS (Checking for Silent Failures)..."
      COMPONENTS=("context" "device" "service" "slice" "pathcomp" "nbi" "webui" "monitoring" "automation")
      for COMP in "$${COMPONENTS[@]}"; do
        echo "--- Logs for $${COMP}service ---"
        kubectl logs --tail=50 -l app=$${COMP}service --all-containers=true || echo "No logs found for $${COMP}service"
      done
      
      echo "[AUDIT] CONNECTIVITY VERIFICATION (Public Endpoint)..."
      # Try to curl the ingress IP to verify perimeter access
      INGRESS_IP=$$(kubectl get ingress tfs-ingress-opt -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || echo "$_INGRESS_IP_FALLBACK")
      echo "Testing Connectivity to: $$INGRESS_IP"
      curl -Ivvv -m 10 http://$$INGRESS_IP || echo "Connectivity Check FAILED (Timeout or Connection Refused)"
      
      echo "[AUDIT] Audit Complete."
substitutions:
  _CLUSTER_NAME: "REPLACE_ME"
  _REGION: "us-central1"
  _INGRESS_IP_FALLBACK: "REPLACE_ME"
