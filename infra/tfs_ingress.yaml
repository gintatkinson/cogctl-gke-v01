apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tfs-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - http:
      paths:
      - path: /webui(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: webuiservice
            port:
              number: 8004
