apiVersion: apps/v1
kind: Deployment
metadata:
  name: automationservice
spec:
  selector:
    matchLabels:
      app: automationservice
  replicas: 1
  template:
    metadata:
      annotations:
        # Required for IETF L2VPN SBI when both parent and child run in same K8s cluster with Linkerd
        config.linkerd.io/skip-outbound-ports: "2002"
      labels:
        app: automationservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/automation:2026-04-20
          imagePullPolicy: Always
          ports:
            - containerPort: 30200
            - containerPort: 9192
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: CRDB_DATABASE
              value: "tfs_automation"
            - name: CRDB_NAMESPACE
              value: "default"
            - name: CRDB_SQL_PORT
              value: "26257"
          envFrom:
            - secretRef:
                name: crdb-data
          startupProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:30200"]
            failureThreshold: 30
            periodSeconds: 1
          resources:
            requests:
              cpu: 125m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: automationservice
  labels:
    app: automationservice
spec:
  type: ClusterIP
  selector:
    app: automationservice
  ports:
    - name: grpc
      protocol: TCP
      port: 30200
      targetPort: 30200
    - name: metrics
      protocol: TCP
      port: 9192
      targetPort: 9192


