apiVersion: apps/v1
kind: Deployment
metadata:
  name: opticalattackdetectorservice
spec:
  selector:
    matchLabels:
      app: opticalattackdetectorservice
  template:
    metadata:
      labels:
        app: opticalattackdetectorservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/opticalattackdetector:2026-04-20
          imagePullPolicy: Always
          ports:
            - containerPort: 10006
            - containerPort: 9192
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: 125m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: opticalattackdetectorservice
  labels:
    app: opticalattackdetectorservice
spec:
  type: ClusterIP
  selector:
    app: opticalattackdetectorservice
  ports:
    - name: grpc
      port: 10006
      targetPort: 10006
    - name: metrics
      port: 9192
      targetPort: 9192
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: opticalattackdetectorservice-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: opticalattackdetectorservice
  minReplicas: 1
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  #behavior:
  #  scaleDown:
  #    stabilizationWindowSeconds: 30

