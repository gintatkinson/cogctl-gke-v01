apiVersion: apps/v1
kind: Deployment
metadata:
  name: deviceservice
spec:
  selector:
    matchLabels:
      app: deviceservice
  replicas: 1
  template:
    metadata:
      annotations:
        # Required for IETF L2VPN SBI when both parent and child run in same K8s cluster with Linkerd
        config.linkerd.io/skip-outbound-ports: "8002"
      labels:
        app: deviceservice
    spec:
      nodeName: gk3-sovereign-genesis-17765289-pool-3-cb584269-9g48
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/device:2026-04-20
          imagePullPolicy: Always
          ports:
            - containerPort: 2020
            - containerPort: 9192
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: CONTEXTSERVICE_HOST
              value: "contextservice"
            - name: CONTEXTSERVICE_PORT
              value: "1010"
          startupProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:2020"]
            failureThreshold: 30
            periodSeconds: 1
          resources:
            requests:
              cpu: 125m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: deviceservice
  labels:
    app: deviceservice
spec:
  type: ClusterIP
  selector:
    app: deviceservice
  ports:
    - name: grpc
      protocol: TCP
      port: 2020
      targetPort: 2020
    - name: metrics
      protocol: TCP
      port: 9192
      targetPort: 9192


