apiVersion: apps/v1
kind: Deployment
metadata:
  name: deviceservice
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: deviceservice
  replicas: 1
  template:
    metadata:
      annotations:
        # Required for IETF L2VPN SBI when both parent and child run in same K8s cluster with Linkerd
        config.linkerd.io/skip-outbound-ports: "8002"
      labels:
        app: deviceservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/deviceservice:v3.1-graduation
          imagePullPolicy: Always
          ports:
            - containerPort: 2020
            - containerPort: 9192
          command: ["/bin/sh", "-c"]
          args:
            - "pip install macaddress p4runtime==1.3.0 && python -m device.service"
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: CONTEXTSERVICE_HOST
              value: "contextservice"
            - name: CONTEXTSERVICE_PORT
              value: "1010"
            - name: CRDB_NAMESPACE
              value: "default"
            - name: KAFKA_API_VERSION
              value: "3.7.0"
            - name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
              value: "python"
          startupProbe:
            grpc:
              port: 2020
            failureThreshold: 30
            periodSeconds: 1
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: deviceservice
  labels:
    app: deviceservice
spec:
  type: ClusterIP
  selector:
    app: deviceservice
  ports:
    - name: grpc
      protocol: TCP
      port: 2020
      targetPort: 2020
    - name: metrics
      protocol: TCP
      port: 9192
      targetPort: 9192


