apiVersion: apps/v1
kind: Deployment
metadata:
  name: teservice
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: teservice
  template:
    metadata:
      annotations:
        config.linkerd.io/skip-inbound-ports: "4189"
      labels:
        app: teservice
    spec:
      terminationGracePeriodSeconds: 5
      shareProcessNamespace: true
      containers:
      - name: server
        image: 
          us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/te:v3.1-graduation
        imagePullPolicy: Always
        ports:
        - containerPort: 10030
        env:
        - name: ERLANG_LOGGER_LEVEL
          value: "debug"
        - name: ERLANG_COOKIE
          value: "tfte-unsafe-cookie"
        - name: ERLANG_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: ERLANG_NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        resources:
          requests:
            cpu: 250m
            memory: 1024Mi
          limits:
            cpu: 700m
            memory: 1024Mi
      initContainers:
      - name: init-dependencies
        image: busybox:1.36
        command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats-client 4222; do 
          echo "waiting for stateful dependencies..."; sleep 2; done;
---
apiVersion: v1
kind: Service
metadata:
  name: teservice
spec:
  type: ClusterIP
  selector:
    app: teservice
  ports:
  - name: grpc
    protocol: TCP
    port: 10030
    targetPort: 10030
  - name: pcep
    protocol: TCP
    port: 4189
    targetPort: 4189

