apiVersion: apps/v1
kind: Deployment
metadata:
  name: osm-clientservice
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: osm-clientservice
  #replicas: 1
  template:
    metadata:
      labels:
        app: osm-clientservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: server
        image: 
          us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/osm_client:v3.1-graduation
        imagePullPolicy: Always
        ports:
        - containerPort: 30210
        - containerPort: 9192
        env:
        - name: OSM_ADDRESS
          value: "127.0.0.1"
        - name: OSM_PORT
          value: "80"
        - name: OSM_USERNAME
          value: "admin"
        - name: OSM_PASSWORD
          value: "admin"
        - name: OSM_PROJECT
          value: "admin"
        - name: OSM_VERIFY_TLS
          value: "FALSE"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            cpu: 250m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
      initContainers:
      - name: init-dependencies
        image: busybox:1.36
        command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats-client 4222; do 
          echo "waiting for stateful dependencies..."; sleep 2; done;
---
apiVersion: v1
kind: Service
metadata:
  name: osm-clientservice
  labels:
    app: osm-clientservice
spec:
  type: ClusterIP
  selector:
    app: osm-clientservice
  ports:
  - name: grpc
    protocol: TCP
    port: 30210
    targetPort: 30210
  - name: metrics
    protocol: TCP
    port: 9192
    targetPort: 9192

