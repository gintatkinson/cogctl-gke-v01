apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoringservice
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: monitoringservice
  replicas: 1
  template:
    metadata:
      labels:
        app: monitoringservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: server
        image: 
          us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/monitoringservice:v3.1-graduation
        imagePullPolicy: Always
        ports:
        - containerPort: 7070
        - containerPort: 9192
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: METRICSDB_HOSTNAME
          value: "questdb-public"
        - name: METRICSDB_ILP_PORT
          value: "9009"
        - name: METRICSDB_REST_PORT
          value: "9000"
        - name: METRICSDB_TABLE
          value: "monitoring"
        envFrom:
        - secretRef:
            name: qdb-data
        startupProbe:
          tcpSocket:
            port: 7070
          initialDelaySeconds: 300
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
      initContainers:
      - name: init-dependencies
        image: busybox:1.36
        command:
        - sh
        - -c
        - until nc -z cockroachdb-public 26257 && nc -z nats-client 4222; do 
          echo "waiting for stateful dependencies..."; sleep 2; done;
---
apiVersion: v1
kind: Service
metadata:
  name: monitoringservice
  labels:
    app: monitoringservice
spec:
  type: ClusterIP
  selector:
    app: monitoringservice
  ports:
  - name: grpc
    protocol: TCP
    port: 7070
    targetPort: 7070
  - name: metrics
    protocol: TCP
    port: 9192
    targetPort: 9192


