# SOVEREIGN GENESIS: COCKROACHDB CLUSTER
# Purpose: Foundational database for Context and Monitoring services.
# Configuration: Fixed to Insecure Mode (TLS: false) to align with baseline services.
# Reference: LOG-044, SOP-03

apiVersion: crdb.cockroachlabs.com/v1alpha1
kind: CrdbCluster
metadata:
  # this translates to the name of the statefulset that is created
  name: cockroachdb
spec:
  dataStore:
    pvc:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: "60Gi"
        volumeMode: Filesystem
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"
  tlsEnabled: false
  image:
    name: us-central1-docker.pkg.dev/cogctl-gke-v01/sovereign-tfs/cockroach:v22.2.8
  # nodes refers to the number of crdb pods that are created
  # via the statefulset
  nodes: 3
  additionalLabels:
    crdb: is-cool
  # affinity is a new API field that is behind a feature gate that is
  # disabled by default. To enable please see the operator.yaml file.

  # The affinity field will accept any podSpec affinity rule.
  topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname  
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/instance: cockroachdb

  # nodeSelectors used to match against
  # nodeSelector:
  #   worker-pool-name: crdb-workers
